<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weddingifts | Criar conta</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <nav class="shell-nav">
    <div class="shell-nav-inner">
      <a class="shell-brand" href="./index.html"><span class="shell-dot"></span><span>Weddingifts</span></a>
      <div class="shell-nav-right">
        <div class="shell-links">
          <a href="./event.html">Evento público</a>
          <a href="./register.html" class="active">Criar conta</a>
          <a href="./login.html">Entrar</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="auth-layout">
    <section class="auth-card">
      <h1 class="auth-title">Crie sua conta</h1>
      <p class="auth-subtitle">Comece seu espaço no Weddingifts para criar eventos e organizar presentes com carinho.</p>

      <form id="register-form" class="form">
        <div class="field"><label for="name-input">Nome</label><input class="input" id="name-input" type="text" placeholder="Maria Silva" required /></div>
        <div class="field"><label for="email-input">E-mail</label><input class="input" id="email-input" type="email" placeholder="maria@email.com" required /></div>
        <div class="field"><label for="cpf-input">CPF</label><input class="input" id="cpf-input" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required /></div>
        <div class="field"><label for="birth-date-input">Data de nascimento</label><input class="input" id="birth-date-input" type="date" required /></div>
        <div class="field"><label for="password-input">Senha</label><input class="input" id="password-input" type="password" placeholder="Mínimo de 6 caracteres" required /></div>
        <div class="field"><label for="confirm-password-input">Confirmar senha</label><input class="input" id="confirm-password-input" type="password" placeholder="Repita a senha" required /></div>
        <button id="submit-button" class="btn btn-primary" type="submit">Criar conta</button>
      </form>

      <p id="status" class="status status-info">Preencha os dados para registrar um novo usuário.</p>
      <p class="auth-footer">Já possui conta? <a id="login-link" href="./login.html">Entrar agora</a></p>
    </section>
  </main>

  <script type="module" src="./js/register.js"></script>
</body>
</html>
